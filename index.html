<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>변지연 투표</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a14;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* 별 */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--dur) infinite; opacity: 0; }
    @keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:1;transform:scale(1)} }

    /* 컨페티 */
    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    .confetti { position: absolute; border-radius: 2px; animation: fall var(--fall-dur) linear forwards; top: -20px; }
    @keyframes fall { to { transform: translateY(110vh) rotate(var(--rot)); opacity: 0; } }

    /* 카드 */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 48px 40px 40px;
      max-width: 600px; width: 100%;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }

    .eyebrow { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 14px; }

    .bjy-emoji {
      font-size: 56px; margin-bottom: 12px;
      animation: bjyFloat 3s ease-in-out infinite;
      display: block;
    }
    @keyframes bjyFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .side-illust { margin-bottom: 10px; pointer-events: none; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }

    .title { font-size: 28px; font-weight: 900; color: white; line-height: 1.45; margin-bottom: 6px; }
    .title .name {
      background: linear-gradient(90deg, #f9a8d4, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 36px; }

    /* 실시간 코멘트 */
    .live-comment {
      font-size: 18px; font-weight: 700; color: white;
      min-height: 30px; margin-bottom: 28px;
      transition: opacity 0.3s;
    }

    /* 배틀 영역 */
    .battle {
      display: flex; align-items: stretch; gap: 0; margin-bottom: 24px;
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .side {
      flex: var(--flex, 1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 20px; cursor: pointer; border: none;
      font-family: inherit; color: white;
      transition: flex 0.7s cubic-bezier(0.16,1,0.3,1);
      position: relative; overflow: hidden;
      touch-action: manipulation;
      min-width: 80px;
    }
    .side:active { filter: brightness(1.2); }

    .side.internet { background: linear-gradient(160deg, #1d4ed8, #0891b2); }
    .side.security { background: linear-gradient(160deg, #7c3aed, #db2777); }

    /* 우세할 때 펄스 */
    .side.winning::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.06);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0} 50%{opacity:1} }

    .side-icon { font-size: 40px; margin-bottom: 10px; pointer-events: none; }
    .side-label { font-size: 18px; font-weight: 800; margin-bottom: 12px; pointer-events: none; }
    .side-count { font-size: 38px; font-weight: 900; letter-spacing: -2px; line-height: 1; pointer-events: none; }
    .side-pct {
      font-size: 15px; font-weight: 700; opacity: 0.8; margin-top: 6px; pointer-events: none;
    }
    .side-crown {
      font-size: 28px; margin-bottom: 4px; pointer-events: none;
      animation: crownBounce 0.8s ease-in-out infinite;
    }
    @keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-6px) rotate(5deg)} }

    /* VS 배지 */
    .vs-divider {
      position: absolute; top: 50%; transform: translate(-50%,-50%);
      z-index: 10; pointer-events: none;
      transition: left 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .vs-badge {
      background: #0a0a14; border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%; width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.7);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .battle-wrap { position: relative; margin-bottom: 24px; }

    /* 하단 바 */
    .bar-wrap {
      height: 8px; border-radius: 99px; overflow: hidden;
      background: rgba(255,255,255,0.08); display: flex; margin-bottom: 14px;
    }
    .bar-left {
      height: 100%; background: linear-gradient(90deg, #1d4ed8, #0891b2);
      transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .bar-right {
      height: 100%; background: linear-gradient(90deg, #7c3aed, #db2777);
      transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
    }

    .total-note { font-size: 12px; color: rgba(255,255,255,0.3); }

    /* 승리 오버레이 */
    .victory-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      animation: overlayIn 0.5s ease forwards;
      backdrop-filter: blur(8px);
    }
    @keyframes overlayIn { from{opacity:0} to{opacity:1} }
    .victory-box {
      text-align: center; padding: 48px 40px;
      animation: boxIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes boxIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
    .victory-emoji { font-size: 80px; display: block; margin-bottom: 20px; animation: victoryBounce 0.8s ease-in-out infinite; }
    @keyframes victoryBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    .victory-title { font-size: 36px; font-weight: 900; color: white; line-height: 1.3; margin-bottom: 12px; }
    .victory-sub { font-size: 18px; color: rgba(255,255,255,0.6); }

    /* 팝 이펙트 */
    .pop {
      position: fixed; pointer-events: none; z-index: 999;
      font-size: 26px; animation: popUp 0.7s ease forwards;
    }
    @keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(1.6)} }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-container" id="confetti"></div>

<div class="card">
  <p class="eyebrow">🔥 실시간 투표</p>
  <div class="bjy-emoji">👩‍💻</div>
  <h1 class="title"><span class="name">변지연</span>은<br>인터넷 vs 보안 어디로?</h1>
  <p class="subtitle">먼저 <strong style="color:white;">1만 표</strong>를 달성하는 쪽으로 변지연의 미래가 결정됩니다!</p>

  <div class="live-comment" id="liveComment">두구두구... 과연 어디로?! 🥁</div>

  <div class="battle-wrap">
    <div class="battle" id="battle">
      <button class="side internet" id="side1" onclick="doVote(1, event)" style="--flex:1">
        <div class="side-crown" id="crown1" style="display:none">👑</div>
        <div class="side-illust">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 지구본 -->
            <circle cx="36" cy="36" r="28" fill="#1d4ed8" opacity="0.3" stroke="#60a5fa" stroke-width="1.5"/>
            <circle cx="36" cy="36" r="28" fill="none" stroke="#93c5fd" stroke-width="2"/>
            <!-- 위도선 -->
            <ellipse cx="36" cy="36" rx="28" ry="10" fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.6"/>
            <ellipse cx="36" cy="36" rx="20" ry="26" fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.6"/>
            <!-- 경도선 -->
            <line x1="36" y1="8" x2="36" y2="64" stroke="#93c5fd" stroke-width="1.2" opacity="0.6"/>
            <!-- 위성 신호 -->
            <circle cx="58" cy="14" r="5" fill="#fde68a"/>
            <path d="M54 18 Q48 24 42 28" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
            <!-- 와이파이 -->
            <path d="M28 52 Q36 44 44 52" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
            <path d="M31 56 Q36 51 41 56" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
            <circle cx="36" cy="60" r="2.5" fill="white" opacity="0.9"/>
          </svg>
        </div>
        <div class="side-label">인터넷</div>
        <div class="side-count" id="count1">0</div>
        <div class="side-pct" id="pct1">50%</div>
      </button>
      <button class="side security" id="side2" onclick="doVote(2, event)" style="--flex:1">
        <div class="side-crown" id="crown2" style="display:none">👑</div>
        <div class="side-illust">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 방패 -->
            <path d="M36 8 L58 18 L58 38 Q58 54 36 64 Q14 54 14 38 L14 18 Z" fill="#7c3aed" opacity="0.35" stroke="#a78bfa" stroke-width="2"/>
            <!-- 방패 내부 자물쇠 -->
            <rect x="27" y="36" width="18" height="14" rx="3" fill="#e879f9" opacity="0.9"/>
            <path d="M29 36 L29 30 Q29 22 36 22 Q43 22 43 30 L43 36" stroke="#e879f9" stroke-width="3" stroke-linecap="round" fill="none"/>
            <circle cx="36" cy="43" r="2.5" fill="#1e1b4b"/>
            <!-- 체크 -->
            <path d="M24 20 L30 26 L44 12" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
            <!-- 반짝이 -->
            <circle cx="52" cy="22" r="3" fill="#fde68a" opacity="0.7"/>
            <circle cx="18" cy="48" r="2" fill="#f9a8d4" opacity="0.6"/>
          </svg>
        </div>
        <div class="side-label">보안</div>
        <div class="side-count" id="count2">0</div>
        <div class="side-pct" id="pct2">50%</div>
      </button>
    </div>
    <div class="vs-divider"><div class="vs-badge">VS</div></div>
  </div>

  <div class="bar-wrap">
    <div class="bar-left" id="barLeft" style="width:50%"></div>
    <div class="bar-right" id="barRight" style="width:50%"></div>
  </div>
  <p class="total-note" id="totalNote">로딩 중...</p>
</div>

<script>
  const SUPA_URL = 'https://srtwzlyiccxtuiijcvbm.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydHd6bHlpY2N4dHVpaWpjdmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDEzMzksImV4cCI6MjA4Nzc3NzMzOX0.JXcS_lZ0W7N8JQ7PVFi5KK6eRrqpAjmWjXRlPFfKcqc';

  const popEmojis = {
    1: ['🌐','💻','📡','⚡','🛜'],
    2: ['🔒','🛡️','🔐','🕵️','💜']
  };

  // 상황별 코멘트
  const comments = {
    tie:       ['두구두구... 과연 어디로?! 🥁', '팽팽한 접전! 승부를 가려주세요 ⚡', '완전 박빙... 떨린다 🫀'],
    internet:  ['🌐 인터넷이 앞서나갑니다!!', '인터넷 우세!! 보안 힘내야겠다 😤', '와 인터넷 달린다!! 🔥', '인터넷 독주?! 보안 어디갔어 😱'],
    security:  ['🔒 보안이 치고 올라옵니다!!', '보안 우세!! 인터넷 분발해! 💪', '보안 가즈아!! 🛡️', '보안이 역전?! 인터넷 긴장해라 😤'],
    close:     ['초박빙!! 한 표 한 표가 소중해요 😮', '아슬아슬!! 누가 뒤집을까?! 🎢'],
  };

  const GOAL = 10000;
  let counts = [0, 0];
  let lastComment = '';

  async function apiFetch(path, opts = {}) {
    const res = await fetch(SUPA_URL + path, {
      headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
      ...opts
    });
    return res.json();
  }

  async function load() {
    const rows = await apiFetch('/rest/v1/bjy_vote?order=id');
    if (!rows || rows.length < 2) return;
    counts = [rows[0].count, rows[1].count];
    render(null);
  }

  const pending = [0, 0];
  const timers  = [null, null];

  function scheduleSave(idx) {
    clearTimeout(timers[idx]);
    timers[idx] = setTimeout(() => {
      const amount = pending[idx];
      pending[idx] = 0;
      apiFetch('/rest/v1/rpc/add_vote', {
        method: 'POST',
        body: JSON.stringify({ row_id: idx + 1, amount })
      }).catch(() => {});
    }, 600);
  }

  function doVote(id, e) {
    const idx = id - 1;
    counts[idx]++;
    pending[idx]++;
    render(idx);
    scheduleSave(idx);

    // 팝 이펙트
    const emoji = popEmojis[id][Math.floor(Math.random() * popEmojis[id].length)];
    const pop = document.createElement('div');
    pop.className = 'pop';
    pop.textContent = emoji;
    pop.style.left = (e.clientX - 16) + 'px';
    pop.style.top  = (e.clientY - 16) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 700);

    if (counts[idx] % 30 === 0) spawnConfetti();
  }

  function pickComment(winnerIdx, diff, total) {
    let pool;
    if (total === 0 || diff === 0) pool = comments.tie;
    else if (diff <= 3)            pool = comments.close;
    else if (winnerIdx === 0)      pool = comments.internet;
    else                           pool = comments.security;

    // 같은 말 반복 방지
    const filtered = pool.filter(c => c !== lastComment);
    const chosen = (filtered.length > 0 ? filtered : pool)[Math.floor(Math.random() * (filtered.length || pool.length))];
    lastComment = chosen;
    return chosen;
  }

  function render(votedIdx) {
    const total = counts[0] + counts[1];
    const pct1 = total === 0 ? 50 : counts[0] / total * 100;
    const pct2 = 100 - pct1;

    // 버튼 크기: 우세한 쪽이 커짐 (1~1.8 비율)
    const flex1 = total === 0 ? 1 : Math.max(0.55, Math.min(1.8, pct1 / 50));
    const flex2 = total === 0 ? 1 : Math.max(0.55, Math.min(1.8, pct2 / 50));
    document.getElementById('side1').style.setProperty('--flex', flex1);
    document.getElementById('side2').style.setProperty('--flex', flex2);

    // 왕관 & winning 클래스
    const winner = total === 0 ? -1 : (counts[0] > counts[1] ? 0 : counts[1] > counts[0] ? 1 : -1);
    document.getElementById('crown1').style.display = winner === 0 ? '' : 'none';
    document.getElementById('crown2').style.display = winner === 1 ? '' : 'none';
    document.getElementById('side1').classList.toggle('winning', winner === 0);
    document.getElementById('side2').classList.toggle('winning', winner === 1);

    document.getElementById('count1').textContent = counts[0].toLocaleString();
    document.getElementById('count2').textContent = counts[1].toLocaleString();
    document.getElementById('pct1').textContent = pct1.toFixed(1) + '%';
    document.getElementById('pct2').textContent = pct2.toFixed(1) + '%';

    document.getElementById('barLeft').style.width  = Math.min(100, counts[0] / GOAL * 100) + '%';
    document.getElementById('barRight').style.width = Math.min(100, counts[1] / GOAL * 100) + '%';

    // VS 배지 위치를 flex 비율에 맞게 이동
    const vsPos = flex1 / (flex1 + flex2) * 100;
    document.querySelector('.vs-divider').style.left = vsPos + '%';

    const reached1 = counts[0] >= GOAL;
    const reached2 = counts[1] >= GOAL;

    if ((reached1 || reached2) && !document.getElementById('victoryOverlay')) {
      const winnerLabel = reached1 ? '🌐 인터넷' : '🔒 보안';
      const winnerMsg   = reached1 ? '변지연의 미래는 인터넷!!' : '변지연의 미래는 보안!!';
      document.getElementById('liveComment').textContent = `${winnerLabel} 1만 표 달성!! 🎉`;

      // 승리 오버레이
      const ov = document.createElement('div');
      ov.className = 'victory-overlay';
      ov.id = 'victoryOverlay';
      ov.innerHTML = `
        <div class="victory-box">
          <span class="victory-emoji">${reached1 ? '🌐' : '🔒'}</span>
          <div class="victory-title">1만 표 달성!<br>${winnerMsg}</div>
          <div class="victory-sub">변지연의 운명이 결정됐습니다 👏</div>
        </div>`;
      ov.onclick = () => ov.remove();
      document.body.appendChild(ov);

      for (let i = 0; i < 4; i++) setTimeout(spawnConfetti, i * 400);
    }

    document.getElementById('totalNote').textContent =
      total === 0 ? '아직 투표가 없어요! 첫 번째 투표자가 되어보세요 👀'
                  : `총 ${total.toLocaleString()}표 / 목표 10,000표 · 새로고침하면 다른 사람 투표가 반영됩니다`;

    // 코멘트 (투표할 때만 바꿈)
    if (votedIdx !== null) {
      const diff = Math.abs(counts[0] - counts[1]);
      const commentEl = document.getElementById('liveComment');
      commentEl.style.opacity = '0';
      setTimeout(() => {
        commentEl.textContent = pickComment(winner, diff, total);
        commentEl.style.opacity = '1';
      }, 200);
    }
  }

  // 별
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*4}s`;
    starsEl.appendChild(s);
  }

  // 컨페티
  const colors = ['#f9a8d4','#a78bfa','#67e8f9','#fde68a','#6ee7b7','#3b82f6'];
  const confettiEl = document.getElementById('confetti');
  function spawnConfetti() {
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      const dur = Math.random() * 2.5 + 2;
      c.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--fall-dur:${dur}s;--rot:${Math.random()*720-360}deg;animation-delay:${Math.random()*1.5}s;width:${Math.random()*8+5}px;height:${Math.random()*8+5}px;border-radius:${Math.random()>.5?'50%':'2px'};opacity:${Math.random()*.5+.5}`;
      confettiEl.appendChild(c);
      setTimeout(() => c.remove(), (dur + 2) * 1000);
    }
  }

  // 배경 컨페티 상시 떨어짐
  spawnConfetti();
  setInterval(spawnConfetti, 3500);

  load();
</script>
</body>
</html>
